services:
  db:
    image: postgres:16
    container_name: sber_bi_postgres
    environment:
      POSTGRES_DB: bank_training
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_pass
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./data:/seed:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_user -d bank_training"]
      interval: 5s
      timeout: 5s
      retries: 20

  metabase:
    image: metabase/metabase:latest
    container_name: sber_bi_metabase
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase
      JAVA_TIMEZONE: Europe/Moscow
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:
